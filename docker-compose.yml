services:

  postgres:
    image: postgres:16-alpine
    container_name: signalmind-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-signalmind}
      POSTGRES_USER: ${DB_USERNAME:-signalmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-signalmind_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-signalmind} -d ${DB_NAME:-signalmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - signalmind-net

  redis:
    image: redis:7-alpine
    container_name: signalmind-redis
    # REDIS_PASSWORD must be in environment so the sh -c shell can expand it.
    # If REDIS_PASSWORD is set and non-empty, Redis requires auth; otherwise no-auth.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >-
      sh -c "redis-server --appendonly yes
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # Pass -a <password> when REDIS_PASSWORD is set; bare ping otherwise.
      test:
        - "CMD-SHELL"
        - "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep -q PONG"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - signalmind-net

volumes:
  postgres_data:
  redis_data:

networks:
  signalmind-net:
    driver: bridge
